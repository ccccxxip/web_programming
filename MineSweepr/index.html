<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Сапёр 12x12</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Сапёр 12×12</h1>

  <div class="info">
    <span>Мины: <span id="mine-count"></span></span>
    <span>Флаги: <span id="flag-count"></span></span>
    <button id="restart-btn">Новая игра</button>
  </div>

  <div id="board" tabindex="0"></div>

  <p class="help">
    Управление: мышь – левая кнопка открыть, правая – флаг.<br>
    Клавиатура: стрелки – перемещение курсора, Space / Enter – открыть,
    Ctrl+Space или Ctrl+Enter – поставить/убрать флаг.
  </p>

  <script src="script.js"></script>
</body>
</html>
